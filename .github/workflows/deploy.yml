name: Build and Deploy

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

run-name: "Deploy · ${{ github.event.inputs.bump }} bump · by @${{ github.actor }}"

jobs:
  deploy:
    name: Build, tag, and deploy
    runs-on: self-hosted   # runs on your server where docker compose is available

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # needed for full commit hash
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Show current version
        run: echo "Current version $(cat VERSION) — will bump ${{ github.event.inputs.bump }}"

      - name: Make build script executable
        run: chmod +x scripts/build_and_deploy.sh

      - name: Run build and deploy
        run: ./scripts/build_and_deploy.sh ${{ github.event.inputs.bump }}

      - name: Create and push git tag
        run: |
          VERSION=$(cat VERSION)
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
